name: Trigger on Develop Branch

on:
  push:
    branches:
      - develop   # 1. Trigger on push to develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4   # 2. Pull Git content

      - name: Copy files to folder
        run: |
          mkdir -p /tmp/my-folder
          cp -r * /tmp/my-folder

      - name: Verify
        run: |
          ls -la /tmp/my-folder
